//right to left pyramid 
let rows = 5;
for(let i = 1; i <= rows; i++){
    let pattern = "";
    for(let j = 1; j <= rows-i; j++){
        pattern += "  ";
    }
    for(let k = 1; k <= i; k++){
        pattern += "* ";
    }
    console.log(pattern);
}
for(let i = rows-1; i >= 1; i--){
    let pattern = "";
    for(let j = 1; j <= rows-i; j++){
        pattern += "  ";
    }
    for(let k = 1; k <= i; k++){
        pattern += "* ";
    }
    console.log(pattern);
}
