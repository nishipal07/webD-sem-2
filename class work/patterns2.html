// Palindrome Triangle 
let rows = 5;
for(let i = 1; i <= rows; i++){
    let pattern = "";
    // increasing numbers
    for(let j = 1; j <= i; j++){
        pattern += j + " ";
    }
    // decreasing numbers
    for(let k = i-1; k >= 1; k--){
        pattern += k + " ";
    }
    console.log(pattern);
}
