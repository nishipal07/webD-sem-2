<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>patterns</title>
</head>
<body>
    <div id="output"></div>
    <script>
        let n=5;
        let pattern="";
        for(let i=1;i<=n;i++){
            let pattern=" ";
            for(let j=1;j<=i;j++){
                pattern +="*";
            }
            console.log(pattern);
        }
        console.log("\n");
        for (let i=5;i>=1;i--){
            let pattern=" ";
            for(let j=1;j<=i;j++){
                pattern+="*";
            }
            console.log(pattern);
        }
        console.log("\n");
        for(let i=1;i<=5;i++){
            let pattern =" ";
            for(let j=0;j<n-1;j++){
            pattern+=" ";
            }
            for(let k=1;k<=i;k++){
                pattern+="*";
            }
            
            console.log(pattern);
        }
        console.log("\n");
        for(let i=5;i>=1;i--){
            let pattern =" ";
            for(let j=0;j<n-1;j++){
            pattern+=" ";
            }
            for(let k=1;k<=i;k++){
                pattern+="*";
            }
            
            console.log(pattern);
        }
        console.log("\n");
        for(let i=1;i<=5;i++){
            let pattern=" ";
            for(let j=0;j<n-i;j++){
           pattern+=" ";
            }
            for(let k=1;k<=2*i-1;k++){
                pattern+="*";
            }
            console.log(pattern);
        }
        console.log("\n");
        for(let i=5;i>=1;i--){
            let pattern="";
            for(let j=1;j<n-i;j++){
           pattern+=" ";
            }
            for(let k=1;k<=2*i-1;k++){
                pattern+="*";
            }
            console.log(pattern);
        }
    </script>
 
</body>
</html>
